global
    log stdout format raw local0
    maxconn 2000

    #stats socket /var/run/haproxy.sock mode 660 level admin
    #stats timeout 30s

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend redis_frontend
    bind *:6379
    default_backend redis_backend

backend redis_backend
    mode tcp
    option tcp-check

    server redis-master   172.30.0.10:6379 check disabled
    server redis-replica1 172.30.0.11:6379 check disabled
    server redis-replica2 172.30.0.12:6379 check disabled
